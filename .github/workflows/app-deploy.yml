name: Deploy Application

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy, e.g. commit SHA'
        required: true
        type: string


permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'guestbook' }}

  AZURE_REGISTRY_LOGIN_SERVER: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER || vars.AZURE_REGISTRY_LOGIN_SERVER || 'acrguestbookdev.azurecr.io' }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || vars.RESOURCE_GROUP_NAME || 'rg-guestbook-dev' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || vars.LOCATION || 'polandcentral' }}

  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'app-guestbook-dev' }}
  AZURE_CONTAINER_APP_ENVIRONMENT_NAME: ${{ vars.AZURE_CONTAINER_APP_ENVIRONMENT_NAME || 'cae-guestbook-dev' }}
  AZURE_CONTAINER_APP_TARGET_PORT: ${{ vars.AZURE_CONTAINER_APP_TARGET_PORT || '8080' }}
  AZURE_CONTAINER_APP_INGRESS: ${{ vars.AZURE_CONTAINER_APP_INGRESS || 'external' }}
  AZURE_CONTAINER_APP_MIN_REPLICAS: ${{ vars.AZURE_CONTAINER_APP_MIN_REPLICAS || '0' }}
  AZURE_CONTAINER_APP_MAX_REPLICAS: ${{ vars.AZURE_CONTAINER_APP_MAX_REPLICAS || '1' }}

  ASPNETCORE_ENVIRONMENT: ${{ vars.ASPNETCORE_ENVIRONMENT || 'Development' }}

  SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME || 'sqlserver-guestbook-dev' }}
  SQL_DATABASE_NAME: ${{ vars.AZURE_SQL_DATABASE_NAME || 'sqldb-guestbook-dev' }}
  SQL_ADMIN_LOGIN: ${{ vars.AZURE_SQL_ADMIN_LOGIN || 'sqladmin' }}
  SQL_CONNECTION_STRING_NAME: ${{ vars.AZURE_SQL_CONNECTION_STRING_NAME || 'DefaultConnection' }}
  SQL_CONNECTION_STRING_SECRET_NAME: ${{ vars.AZURE_SQL_CONNECTION_STRING_SECRET_NAME || 'sql-connection-string' }}

jobs:
  deploy:
    name: Deploy - dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Image Tag
        id: image
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${INPUT_IMAGE_TAG}"

          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag."
            exit 1
          fi
          
          IMAGE_URI="${AZURE_REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${IMAGE_URI}"

      - name: Azure Login OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI Extensions
        shell: bash
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade

      - name: Validate Deployment Configuration
        shell: bash
        env:
          SQL_ADMIN_PASSWORD_VALUE: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0

          for variable_name in \
            AZURE_REGISTRY_LOGIN_SERVER \
            AZURE_RESOURCE_GROUP \
            AZURE_CONTAINER_APP_NAME \
            AZURE_CONTAINER_APP_ENVIRONMENT_NAME \
            AZURE_CONTAINER_APP_TARGET_PORT \
            AZURE_CONTAINER_APP_INGRESS \
            SQL_SERVER_NAME \
            SQL_DATABASE_NAME \
            SQL_ADMIN_LOGIN \
            SQL_CONNECTION_STRING_NAME \
            SQL_CONNECTION_STRING_SECRET_NAME; do
            if [ -z "${!variable_name:-}" ]; then
              echo "Missing required configuration: ${variable_name}"
              missing=1
            fi
          done

          if [ -z "${SQL_ADMIN_PASSWORD_VALUE:-}" ]; then
            echo "Missing required secret: SQL_ADMIN_PASSWORD"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Set the missing values as GitHub Environment/Repository variables or secrets."
            exit 1
          fi

          echo "Configuration validated."
          echo "Resource group: ${AZURE_RESOURCE_GROUP}"
          echo "Container App: ${AZURE_CONTAINER_APP_NAME}"
          echo "Container Apps Environment: ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}"
          echo "Target port: ${AZURE_CONTAINER_APP_TARGET_PORT}"
          echo "Ingress: ${AZURE_CONTAINER_APP_INGRESS}"
          echo "SQL server: ${SQL_SERVER_NAME}.database.windows.net"
          echo "SQL database: ${SQL_DATABASE_NAME}"
          echo "SQL user: ${SQL_ADMIN_LOGIN}"
          echo "ConnectionStrings key: ConnectionStrings__${SQL_CONNECTION_STRING_NAME}"

      - name: Get ACR Credentials
        id: acr
        shell: bash
        run: |
          set -euo pipefail

          ACR_NAME="${AZURE_REGISTRY_LOGIN_SERVER%%.*}"

          ACR_USERNAME=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "username" \
            -o tsv)

          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" \
            -o tsv)

          echo "::add-mask::${ACR_PASSWORD}"
          echo "name=${ACR_NAME}" >> "$GITHUB_OUTPUT"
          echo "username=${ACR_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "password=${ACR_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Verify Image Exists in ACR
        shell: bash
        env:
          ACR_NAME: ${{ steps.acr.outputs.name }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          az acr repository show \
            --name "$ACR_NAME" \
            --image "${IMAGE_NAME}:${IMAGE_TAG}" \
            --only-show-errors \
            1>/dev/null

          echo "Image found in ACR: ${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Verify Container Apps Environment Exists
        shell: bash
        run: |
          set -euo pipefail

          if ! az containerapp env show \
            --name "${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --only-show-errors \
            1>/dev/null; then
            echo "Container Apps Environment does not exist: ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}"
            echo "This workflow creates the Container App, but the Container Apps Environment should be created by infra-apply/Terraform."
            echo "Run infra-apply first or check that the variable name matches: container_app_environment = ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}"
            exit 1
          fi

          echo "Container Apps Environment exists: ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}"

      - name: Build SQL Connection String
        id: sql
        shell: bash
        env:
          SQL_ADMIN_PASSWORD_VALUE: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          CONNECTION_STRING="Server=tcp:${SQL_SERVER_NAME}.database.windows.net,1433;Initial Catalog=${SQL_DATABASE_NAME};Persist Security Info=False;User ID=${SQL_ADMIN_LOGIN};Password=${SQL_ADMIN_PASSWORD_VALUE};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          echo "::add-mask::${SQL_ADMIN_PASSWORD_VALUE}"
          echo "::add-mask::${CONNECTION_STRING}"
          echo "secret-name=${SQL_CONNECTION_STRING_SECRET_NAME}" >> "$GITHUB_OUTPUT"
          echo "env-name=ConnectionStrings__${SQL_CONNECTION_STRING_NAME}" >> "$GITHUB_OUTPUT"

          {
            echo "connection-string<<EOF"
            echo "$CONNECTION_STRING"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or Update Container App
        shell: bash
        env:
          ACR_USERNAME: ${{ steps.acr.outputs.username }}
          ACR_PASSWORD: ${{ steps.acr.outputs.password }}
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          SQL_CONNECTION_STRING: ${{ steps.sql.outputs.connection-string }}
          SQL_SECRET_NAME: ${{ steps.sql.outputs.secret-name }}
          SQL_ENV_NAME: ${{ steps.sql.outputs.env-name }}
        run: |
          set -euo pipefail

          echo "Container App: ${AZURE_CONTAINER_APP_NAME}"
          echo "Resource Group: ${AZURE_RESOURCE_GROUP}"
          echo "Container Apps Environment: ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}"
          echo "Image: ${IMAGE_URI}"
          echo "Target port: ${AZURE_CONTAINER_APP_TARGET_PORT}"
          echo "SQL env var: ${SQL_ENV_NAME}"
          echo "SQL secret name: ${SQL_SECRET_NAME}"

          if az containerapp show \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --only-show-errors \
            1>/dev/null 2>/dev/null; then

            echo "Container App exists. Updating image, registry, secret and environment variables..."

            az containerapp registry set \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --server "${AZURE_REGISTRY_LOGIN_SERVER}" \
              --username "${ACR_USERNAME}" \
              --password "${ACR_PASSWORD}" \
              --only-show-errors

            az containerapp secret set \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --secrets "${SQL_SECRET_NAME}=${SQL_CONNECTION_STRING}" \
              --only-show-errors

            az containerapp update \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE_URI}" \
              --set-env-vars \
                "ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}" \
                "ASPNETCORE_HTTP_PORTS=${AZURE_CONTAINER_APP_TARGET_PORT}" \
                "${SQL_ENV_NAME}=secretref:${SQL_SECRET_NAME}" \
              --min-replicas "${AZURE_CONTAINER_APP_MIN_REPLICAS}" \
              --max-replicas "${AZURE_CONTAINER_APP_MAX_REPLICAS}" \
              --only-show-errors

            if az containerapp ingress show \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --only-show-errors \
              1>/dev/null 2>/dev/null; then
              az containerapp ingress update \
                --name "${AZURE_CONTAINER_APP_NAME}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --type "${AZURE_CONTAINER_APP_INGRESS}" \
                --target-port "${AZURE_CONTAINER_APP_TARGET_PORT}" \
                --only-show-errors
            else
              az containerapp ingress enable \
                --name "${AZURE_CONTAINER_APP_NAME}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --type "${AZURE_CONTAINER_APP_INGRESS}" \
                --target-port "${AZURE_CONTAINER_APP_TARGET_PORT}" \
                --only-show-errors
            fi

          else
            echo "Container App does not exist. Creating it now..."

            az containerapp create \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --environment "${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}" \
              --image "${IMAGE_URI}" \
              --registry-server "${AZURE_REGISTRY_LOGIN_SERVER}" \
              --registry-username "${ACR_USERNAME}" \
              --registry-password "${ACR_PASSWORD}" \
              --ingress "${AZURE_CONTAINER_APP_INGRESS}" \
              --target-port "${AZURE_CONTAINER_APP_TARGET_PORT}" \
              --min-replicas "${AZURE_CONTAINER_APP_MIN_REPLICAS}" \
              --max-replicas "${AZURE_CONTAINER_APP_MAX_REPLICAS}" \
              --secrets "${SQL_SECRET_NAME}=${SQL_CONNECTION_STRING}" \
              --env-vars \
                "ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}" \
                "ASPNETCORE_HTTP_PORTS=${AZURE_CONTAINER_APP_TARGET_PORT}" \
                "${SQL_ENV_NAME}=secretref:${SQL_SECRET_NAME}" \
              --only-show-errors
          fi

      - name: Output Deployment Details
        shell: bash
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          set -euo pipefail

          FQDN=$(az containerapp show \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo "## Application Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Container App: ${AZURE_CONTAINER_APP_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource Group: ${AZURE_RESOURCE_GROUP}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Container Apps Environment: ${AZURE_CONTAINER_APP_ENVIRONMENT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${IMAGE_URI}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target port: ${AZURE_CONTAINER_APP_TARGET_PORT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SQL Server: ${SQL_SERVER_NAME}.database.windows.net" >> "$GITHUB_STEP_SUMMARY"
          echo "- SQL Database: ${SQL_DATABASE_NAME}" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$FQDN" ]; then
            echo "- URL: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
            echo "Application URL: https://${FQDN}"
          else
            echo "- URL: not available" >> "$GITHUB_STEP_SUMMARY"
            echo "Application URL not available. Check ingress configuration."
          fi
