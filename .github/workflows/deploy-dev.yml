name: Deploy Development Environment
on:
  workflow_dispatch:
#  push:
#    branches:
#      - main

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  infra-plan:
    name: Terraform Plan
    uses: ./.github/workflows/infra-plan.yml
    secrets: inherit

  infra-apply:
    needs: infra-plan
    name: Terraform Apply
    uses: ./.github/workflows/infra-apply.yml
    secrets: inherit
    
  app-build:
    needs:
      - infra-plan
      - infra-apply
    name: Build and Push Application
    uses: ./.github/workflows/app-build.yml
    secrets: inherit

  app-deploy:
    needs: app-build
    name: Deploy Application
    uses: ./.github/workflows/app-deploy.yml
    with:
      image-tag: ${{ needs.app-build.outputs.image-tag }}
    secrets: inherit