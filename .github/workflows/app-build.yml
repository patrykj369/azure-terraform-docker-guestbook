name: Build and Push Application

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/app-build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: guestbook

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.build.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: tags
        run: |
          IMAGE_TAG="${{ github.sha }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Login Credentials
        id: acr
        run: |
          ACR_URL="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          
          # Get ACR credentials using OIDC
          ACR_USERNAME=$(az acr credential show \
            --name $(echo ${ACR_URL} | cut -d'.' -f1) \
            --query "username" -o tsv)
          
          ACR_PASSWORD=$(az acr credential show \
            --name $(echo ${ACR_URL} | cut -d'.' -f1) \
            --query "passwords[0].value" -o tsv)
          
          echo "::add-mask::${ACR_PASSWORD}"
          echo "username=${ACR_USERNAME}" >> $GITHUB_OUTPUT
          echo "password=${ACR_PASSWORD}" >> $GITHUB_OUTPUT
          echo "url=${ACR_URL}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.url }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.acr.outputs.url }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output Build Results
        run: |
          IMAGE_URI="${{ steps.acr.outputs.url }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}"
          echo "Image built and pushed: ${IMAGE_URI}"
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "::set-output name=image-uri::${IMAGE_URI}"
          echo "::set-output name=image-tag::${{ steps.tags.outputs.tag }}"

  # TODO: Run integration tests if applicable
  # - Build application with test dependencies
  # - Run unit tests
  # - Run integration tests against test database
  # Only push to ACR if tests pass
